version: '3.8'

services:
  milvus:
    image: registry.aliyuncs.com/milvusdb/milvus:v2.4.0
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    command: milvus run standalone

volumes:
  milvus_data:
