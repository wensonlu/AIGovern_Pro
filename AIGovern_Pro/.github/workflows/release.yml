name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release-npm:
    name: Publish agent-debug-mcp to npm
    runs-on: ubuntu-latest
    needs: [release-python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent-debug-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-debug-mcp

      - name: Build
        run: npm run build
        working-directory: agent-debug-mcp

      - name: Publish to npm
        run: npm publish --access public
        working-directory: agent-debug-mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-python:
    name: Publish python-sdk to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install build

      - name: Build package
        run: python -m build
        working-directory: python-sdk

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: python-sdk/dist/
