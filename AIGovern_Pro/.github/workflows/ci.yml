name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Type Check + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ai-debug-mcp/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: ai-debug-mcp

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ai-debug-mcp

      - name: Run tests
        run: npm test
        working-directory: ai-debug-mcp

      - name: Build
        run: npm run build
        working-directory: ai-debug-mcp

      - name: Verify dist output
        run: test -f dist/index.js && test -f dist/types/index.d.ts
        working-directory: ai-debug-mcp
